services:


  sqlserver:
    container_name: sqlserver-1
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPass123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P 'StrongPass123!' -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 10s
      retries: 15 
      start_period: 30s 
    restart: unless-stopped


  redis:
    container_name: redis-1
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  
  mountebank:
    container_name: mountebank-1
    image: bbyars/mountebank:latest
    ports:
      - "2525:2525"
      - "3001:3001"
    volumes:
      - ./imposter:/imposter
    command: start --configfile /imposter/mountebank.json --allowInjection
    restart: unless-stopped

  api:
    container_name: api-1
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Connection strings utilizando o padrão "__" para override de appsettings.json
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ProjetoFinalDB;User Id=sa;Password=StrongPass123!;TrustServerCertificate=True
      - Redis__ConnectionString=redis:6379
      - Jwt__Key=ChaveSecretaMuitoLongaParaJWT2026AntonioDario!
      - Jwt__Issuer=ApiAntonioDario
      - Jwt__Audience=ApiAntonioDarioUsers
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      # A API só inicia quando o SQL Server passa no Healthcheck e os outros serviços estão prontos, garantindo que todas as dependências estão disponíveis
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      mountebank:
        condition: service_started
    restart: unless-stopped

volumes:
  sqldata: